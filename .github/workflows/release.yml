name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: ploc-linux-x86_64.tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: ploc-macos-x86_64.tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: ploc-macos-aarch64.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target "${{ matrix.target }}"

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          mkdir -p dist/share/man/man1
          cp "target/${{ matrix.target }}/release/ploc" dist/ploc
          cp share/man/man1/ploc.1 dist/share/man/man1/ploc.1
          tar -C dist -czf "${{ matrix.archive }}" ploc share/man/man1/ploc.1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*.tar.gz
          generate_release_notes: true
