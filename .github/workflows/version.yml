name: Version

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  version:
    if: ${{ github.actor != 'github-actions[bot]' && !startsWith(github.event.head_commit.message, 'chore(release):') }}
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.version.outputs.should_release }}
      version: ${{ steps.version.outputs.version }}
      tag: v${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Determine next version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          latest_tag="$(git tag --list 'v*' --sort=-v:refname | head -n1)"
          if [[ -z "$latest_tag" ]]; then
            current_version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')"
            range=""
          else
            current_version="${latest_tag#v}"
            range="${latest_tag}..HEAD"
          fi

          messages="$(git log --format=%B $range)"
          bump="none"

          if grep -Eq '(^[a-zA-Z]+(\([^)]+\))?!:|BREAKING CHANGE:)' <<<"$messages"; then
            bump="major"
          elif grep -Eq '^feat(\([^)]+\))?:' <<<"$messages"; then
            bump="minor"
          elif grep -Eq '^fix(\([^)]+\))?:' <<<"$messages"; then
            bump="patch"
          fi

          if [[ "$bump" == "none" ]]; then
            echo "No version bump required."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          IFS=. read -r major minor patch <<<"$current_version"
          case "$bump" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
          esac

          next_version="${major}.${minor}.${patch}"
          echo "should_release=true" >> "$GITHUB_OUTPUT"
          echo "version=$next_version" >> "$GITHUB_OUTPUT"

      - name: Update Cargo version
        if: steps.version.outputs.should_release == 'true'
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          perl -0pi -e 's/^version = "[^"]+"/version = "'"$version"'"/m' Cargo.toml
          cargo update -p ploc --precise "$version"

      - name: Commit and tag version
        if: steps.version.outputs.should_release == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock
          git commit -m "chore(release): v${{ steps.version.outputs.version }}"
          git tag "v${{ steps.version.outputs.version }}"
          git push
          git push origin "v${{ steps.version.outputs.version }}"

  build:
    name: Build ${{ matrix.target }}
    needs: version
    if: needs.version.outputs.should_release == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: ploc-linux-x86_64.tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: ploc-macos-x86_64.tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: ploc-macos-aarch64.tar.gz

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.tag }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target "${{ matrix.target }}"

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          mkdir -p dist/share/man/man1
          cp "target/${{ matrix.target }}/release/ploc" dist/ploc
          cp share/man/man1/ploc.1 dist/share/man/man1/ploc.1
          tar -C dist -czf "${{ matrix.archive }}" ploc share/man/man1/ploc.1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  release:
    name: Publish GitHub Release
    needs:
      - version
      - build
    if: needs.version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          files: dist/**/*.tar.gz
          generate_release_notes: true
